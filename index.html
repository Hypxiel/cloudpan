<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charhax的下载站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-200 p-6">

    <div class="max-w-6xl mx-auto">
        <!-- 标题 -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-white">Charhax的下载站</h1>
            <p class="text-slate-400 text-sm mt-1">Bilibili@Aww花桦，酷安@Charhax</p>
        </div>

        <!-- 文件列表容器 -->
        <div id="fileList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            
            <!-- ========== 在这里添加软件条目 ========== -->
            
            <!-- 条目模板：复制这一段，改名字和描述即可 -->
            <div class="item" 
                 data-name="月虹一键隐藏" 
                 data-file="月虹一键隐藏5.4.3.zip" 
                 data-size="620 KB" 
                 data-desc="月虹的一键隐藏模块">
            </div>

            <div class="item" 
                 data-name="HMA-OSS-Zygisk模块" 
                 data-file="hmaoss.zip" 
                 data-size="2.44 MB" 
                 data-desc="适配HMA-OSS">
            </div>

            <div class="item" 
                 data-name="HMA-OSS" 
                 data-file="hmaoss.apk" 
                 data-size="3.4 MB" 
                 data-desc="应用隐藏plus">
            </div>


            <div class="item" 
                 data-name="Sukisu Ultra v413" 
                 data-file="sukisu.apk" 
                 data-size="11.6 MB" 
                 data-desc="内核级root管理器">
            </div>

            <div class="item" 
                 data-name="HyperUnlocked" 
                 data-file="h.zip" 
                 data-size="67 KB" 
                 data-desc="小米低端机补阉割模块">
            </div>

            <div class="item" 
                 data-name="自动禁用avb2.0模块" 
                 data-file="avb.zip" 
                 data-size="85 KB" 
                 data-desc="免刷机的禁用avb模块">
            </div>

            <div class="item" 
                 data-name="澎湃UI流畅模块" 
                 data-file="uiboost.zip" 
                 data-size="2.3 KB" 
                 data-desc="酷安@坐看雲起i">
            </div>
            <!-- 添加更多条目... -->
            <!-- <div class="item" data-name="软件名称" data-file="文件名.apk" data-size="大小" data-desc="介绍文字"></div> -->

        </div>
    </div>

    <script>
        // 自动渲染所有条目
        document.querySelectorAll('.item').forEach(el => {
            const name = el.dataset.name;
            const file = el.dataset.file;
            const size = el.dataset.size;
            const desc = el.dataset.desc;

            el.outerHTML = `
                <a href="/apps/${file}" download class="block bg-slate-800 border border-slate-700 rounded-xl p-5 hover:border-cyan-500/50 hover:bg-slate-750 transition-all group">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center flex-shrink-0">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-1">
                                <h3 class="font-semibold text-white truncate">${name}</h3>
                                <span class="text-xs text-slate-500 flex-shrink-0 ml-2">${size}</span>
                            </div>
                            <p class="text-sm text-slate-400 line-clamp-2">${desc}</p>
                            <div class="mt-3 flex items-center gap-1 text-cyan-400 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                                </svg>
                                点击下载
                            </div>
                        </div>
                    </div>
                </a>
            `;
        });
    </script>

</body>
</html>
