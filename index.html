<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用下载站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-200 p-6">

    <div class="max-w-6xl mx-auto">
        <!-- 标题 -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-white">应用下载中心</h1>
            <p class="text-slate-400 text-sm mt-1">点击卡片即可下载</p>
        </div>

        <!-- 文件列表容器 -->
        <div id="fileList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            
            <!-- ========== 在这里添加软件条目 ========== -->
            
            <!-- 条目模板：复制这一段，改名字和描述即可 -->
            <div class="item" 
                 data-name="微信" 
                 data-file="WeChat_8.0.50.apk" 
                 data-size="272 MB" 
                 data-desc="全方位的手机通讯应用，支持文字、语音、视频聊天">
            </div>

            <div class="item" 
                 data-name="Chrome浏览器" 
                 data-file="Chrome_126.0.apk" 
                 data-size="149 MB" 
                 data-desc="快速安全的网络浏览器，内置Google搜索和翻译">
            </div>

            <div class="item" 
                 data-name="网易云音乐" 
                 data-file="NetEase_Music_9.1.20.apk" 
                 data-size="189 MB" 
                 data-desc="专注于发现与分享的音乐产品，专业DJ推荐">
            </div>

            <!-- 添加更多条目... -->
            <!-- <div class="item" data-name="软件名称" data-file="文件名.apk" data-size="大小" data-desc="介绍文字"></div> -->

        </div>
    </div>

    <script>
        // 自动渲染所有条目
        document.querySelectorAll('.item').forEach(el => {
            const name = el.dataset.name;
            const file = el.dataset.file;
            const size = el.dataset.size;
            const desc = el.dataset.desc;

            el.outerHTML = `
                <a href="/apps/${file}" download class="block bg-slate-800 border border-slate-700 rounded-xl p-5 hover:border-cyan-500/50 hover:bg-slate-750 transition-all group">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center flex-shrink-0">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-1">
                                <h3 class="font-semibold text-white truncate">${name}</h3>
                                <span class="text-xs text-slate-500 flex-shrink-0 ml-2">${size}</span>
                            </div>
                            <p class="text-sm text-slate-400 line-clamp-2">${desc}</p>
                            <div class="mt-3 flex items-center gap-1 text-cyan-400 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                                </svg>
                                点击下载
                            </div>
                        </div>
                    </div>
                </a>
            `;
        });
    </script>

</body>
</html>
